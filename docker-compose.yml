services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blog8byte
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blog8byte"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment below to run the app in Docker as well
  # app:
  #   build: .
  #   ports:
  #     - "3000:3000"
  #   env_file: .env
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pgdata:
